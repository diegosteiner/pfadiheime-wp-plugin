name: Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGIN_SLUG: pfadiheime

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build blocks
        run: npm run build

      - name: Package plugin
        run: |
          mkdir -p "dist/${PLUGIN_SLUG}"
          cp -r pfadiheime.php includes build readme.txt "dist/${PLUGIN_SLUG}/"
          (cd dist && zip -r "../${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}")

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_SLUG }}
          path: ${{ env.PLUGIN_SLUG }}.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}-${GITHUB_REF_NAME}.zip"
          gh release create "${GITHUB_REF_NAME}" \
            "${PLUGIN_SLUG}-${GITHUB_REF_NAME}.zip" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
